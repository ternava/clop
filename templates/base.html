<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ config.extra.title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% elif config.extra.description %}{{ config.extra.description }}{% else %}{{ config.extra.title }}{% endif %}">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            font-size: 16px;
            line-height: 1.6;
            max-width: 72ch;
            margin: 2rem auto;
            padding: 0 2rem;
            background: #fffdfb;
            color: #3a322e;
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: inherit;
            font-weight: 600;
            margin: 1.8rem 0 0.8rem 0;
            line-height: 1.3;
            color: #2b2420;
        }
        
        h1 { 
            font-size: 1.5rem; 
            margin-top: 1rem;
            margin-bottom: 0.5rem;
        }
        h2 { 
            font-size: 1.25rem; 
            margin-top: 1.5rem;
            margin-bottom: 0.6rem;
        }
        h3 { 
            font-size: 1.1rem; 
            margin-top: 1.2rem;
            margin-bottom: 0.5rem;
        }
        
        a {
            color: #b5532f;
            text-decoration: underline;
        }
        
        a:hover {
            color: #933f20;
        }
        
        p {
            margin: 0.8rem 0;
        }

        .button {
            display: inline-block;
            padding: 0.6rem 1.4rem;
            margin: 0.4rem 0.4rem 0.4rem 0;
            background: linear-gradient(135deg, #d97757 0%, #b5532f 100%);
            color: #fff !important;
            text-decoration: none;
            font-weight: 600;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(122,60,30,0.2);
            transition: transform 0.1s, box-shadow 0.2s;
        }

        .button:hover {
            color: #fff !important;
            text-decoration: none;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(122,60,30,0.28);
        }

        .button.secondary {
            background: #f7efe9;
            color: #5a4d44 !important;
            border: 1px solid #e3d3c8;
            box-shadow: none;
        }

        pre {
            background: #faf6f2;
            border: 1px solid #ecddd2;
            border-radius: 6px;
            padding: 0.9rem 1rem;
            overflow-x: auto;
            font-size: 0.9rem;
            line-height: 1.45;
        }

        code {
            font-family: 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace;
            font-size: 0.9em;
            background: #f7efe9;
            padding: 0.1rem 0.3rem;
            border-radius: 4px;
        }

        pre code {
            background: none;
            padding: 0;
        }

        /* Terminal-style output blocks (```console). A warm charcoal panel
           that stands apart from the light example/command blocks. */
        pre:has(> code[data-lang="console"]) {
            background: #2b2420;
            border-color: #2b2420;
            color: #f4e9e1;
            box-shadow: inset 0 0 0 1px rgba(217,119,87,0.25);
        }

        pre:has(> code[data-lang="console"]) code {
            color: inherit;
        }

        table {
            border-collapse: collapse;
            margin: 1rem 0;
            width: 100%;
        }

        th, td {
            border: 1px solid #ecddd2;
            padding: 0.4rem 0.7rem;
            text-align: left;
            font-size: 0.92rem;
        }

        th {
            background: #f7efe9;
        }

        .header {
            margin-bottom: 0;
            padding: 1.5rem 2rem;
            margin-left: -2rem;
            margin-right: -2rem;
            margin-top: -2rem;
            background: linear-gradient(135deg, #d97757 0%, #b5532f 100%);
            box-shadow: 0 4px 12px rgba(122,60,30,0.2);
        }
        
        .header h1 {
            margin: 0;
            font-size: 1.6rem;
            letter-spacing: 0.5px;
        }
        
        .header h1 a {
            color: white !important;
            text-decoration: none;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        
        .header p {
            color: rgba(255, 255, 255, 0.85);
            margin: 0.3rem 0 0 0;
            font-size: 0.9rem;
        }
        
        .nav {
            margin-top: 0;
            padding: 0.6rem 0;
            display: flex;
            gap: 0.5rem;
            border-bottom: 1px solid #ecddd2;
            background: #faf6f2;
            margin-left: -2rem;
            margin-right: -2rem;
            padding-left: 2rem;
            padding-right: 2rem;
        }
        
        .nav a {
            display: inline-block;
            padding: 0.4rem 1rem;
            color: #5a4d44;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 6px;
            transition: background 0.2s, color 0.2s;
        }
        
        .nav a:hover {
            background: #f2e6dd;
            color: #b5532f;
            text-decoration: none;
        }

        .nav a.active {
            background: #f2e6dd;
            color: #b5532f;
        }
        
        .footer {
            border-top: 1px solid #ecddd2;
            margin-top: 3rem;
            padding-top: 1rem;
            font-size: 0.9rem;
            color: #8a7a6e;
        }
        
        @media (max-width: 600px) {
            body {
                margin: 1rem auto;
                padding: 0 1.5rem;
                line-height: 1.55;
            }
            
            h1, h2, h3 {
                margin-top: 1rem;
            }
            
            .header {
                margin-bottom: 1.5rem;
                padding-bottom: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <header>
      <div class="header">
          <h1><a href="{{ get_url(path="") }}">{{ config.extra.title }}</a></h1>
          {% if config.extra.description %}
          <p>{{ config.extra.description }}</p>
          {% endif %}
      </div>
      <nav class="nav">
          {% set cur = current_path | default(value="/") %}
          <a href="{{ get_url(path="@/_index.md") }}"{% if cur == "/" or cur == get_url(path="") %} class="active"{% endif %}>Home</a>
          <a href="{{ get_url(path="@/usage.md") }}"{% if cur is containing("/usage") %} class="active"{% endif %}>Usage</a>
          <a href="{{ get_url(path="@/support.md") }}"{% if cur is containing("/support") %} class="active"{% endif %}>Support</a>
      </nav>
    </header>

    <main>
        {% block content %}{% endblock content %}
    </main>
    
    <div class="footer">
        <p>Last updated: {{ now() | date(format="%B %Y") }}</p>
    </div>
</body>
</html>
